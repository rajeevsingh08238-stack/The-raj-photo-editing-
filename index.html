<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Editing Service</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:30px;
}
.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
button{
    background:#007bff;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}
.loader{
    display:none;
    margin:20px auto;
    border:5px solid #ddd;
    border-top:5px solid #007bff;
    border-radius:50%;
    width:50px;
    height:50px;
    animation:spin 1s linear infinite;
}
@keyframes spin{
    100%{transform:rotate(360deg);}
}
</style>
</head>
<body>

<div class="container">
    <h2>Photo Editing Service</h2>
    <p>Apni photo upload karein</p>

    <input type="file" id="photo"><br><br>

    <button onclick="uploadPhoto()">Send Photo</button>

    <div class="loader" id="loader"></div>

    <p id="msg"></p>
</div>

<script>
function uploadPhoto(){
    document.getElementById("loader").style.display="block";

    setTimeout(()=>{
        document.getElementById("loader").style.display="none";
        document.getElementById("msg").innerHTML=
        "Photo successfully received. Editing process started.";
    },3000);
}
</script>

</body>
</html>
